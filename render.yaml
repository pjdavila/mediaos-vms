services:
  - type: web
    name: mediaos-vms
    region: oregon
    plan: free
    repo: https://github.com/pjdavila/mediaos-vms
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
